[package]
name = "zero2prod"
version = "0.1.0"
edition = "2024"
rust-version = "1.94.1"
authors = ["Shubhendu A Dutta <shubhenduanupam@gmail.com>"]
repository = "https://github.com/shubhenduanupamdutta/Zero2Prod_Axum_Diesel"

[lib]
path = "src/lib.rs"

[[bin]]
name = "zero2prod"
path = "src/main.rs"

[dependencies]
axum = "0.8.8"
tokio = { version = "1.51.0", features = ["macros", "rt-multi-thread"] }
